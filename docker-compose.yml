services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: velib
      POSTGRES_PASSWORD: velib
      POSTGRES_DB: velib_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U velib -d velib_db']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://velib:velib@db:5432/velib_db
      JWT_SECRET: ${JWT_SECRET:-velib-docker-dev-jwt-secret-min-32-chars}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/api/stations >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 36
      start_period: 180s

volumes:
  pgdata:
