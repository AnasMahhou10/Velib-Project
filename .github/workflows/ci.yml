name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://velib:velib@localhost:5432/velib_db
  JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long

jobs:
  quality:
    name: Qualité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build production Next.js
        run: npm run build

  les-tests:
    name: Les tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Tests unitaires Vitest
        run: npm test
