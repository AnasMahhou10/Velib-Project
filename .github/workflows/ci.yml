name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://velib:velib@localhost:5432/velib_db
  JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long

jobs:
  quality:
    name: Qualité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build production Next.js
        run: npm run build

  les-tests:
    name: Les tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Tests unitaires Vitest
        run: npm test

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      JWT_SECRET: ci-docker-jwt-secret-minimum-32-chars
    steps:
      - uses: actions/checkout@v4

      - name: Build image Docker (sans cache — comme un clone frais)
        run: docker compose build --no-cache app

      - name: Démarrer PostgreSQL et app (seed + healthcheck)
        run: docker compose up -d --wait --wait-timeout 600

      - name: Smoke test — API stations
        run: curl -fsS http://localhost:3000/api/stations

      - name: Smoke test — API balades
        run: curl -fsS http://localhost:3000/api/ride-groups

      - name: Smoke test — page login
        run: curl -fsS -o /dev/null -w "%{http_code}" http://localhost:3000/login | grep -q 200

      - name: Arrêter les conteneurs
        if: always()
        run: docker compose down -v
