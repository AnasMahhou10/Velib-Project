name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    # Requis par prisma.config.ts (postinstall = prisma generate pendant npm ci)
    env:
      DATABASE_URL: postgresql://velib:velib@localhost:5432/velib_db
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
